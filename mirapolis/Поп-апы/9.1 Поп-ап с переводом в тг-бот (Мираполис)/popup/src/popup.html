<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./popup/dist/popup.css" inline>
</head>

<body>
<div class="cq-popup__bg"></div>
<div class="wrapper__body d_flex">
    <div class="cq-popup__body d_flex flex_col">
        <a class="cq-popup__close"></a>
        <form id="form" class="cq-popup__form d_flex flex_col first-form">

            <p class="cq-popup__text-h1">Ваш персональный HR-помощник в Telegram</p>
            <p class="cq-popup__text">Который поможет вам:</p>
            <div class="line">
                <img src="https://files.carrotquest.app/message-images/68184/68184-1756107798115-e7ycd41p.png" alt=""
                     class="line_img">
                <p class="line_text"><span>Мгновенно получить</span> наши полезные гайды <br class="pc">или чек-лист прямо в чате</p>
            </div>
            <div class="line">
                <img src="https://files.carrotquest.app/message-images/68184/68184-1756107798115-e7ycd41p.png" alt=""
                     class="line_img">
                <p class="line_text"><span>Первыми узнавать</span> о новых вебинарах и статьях, <br class="pc">чтобы вы не упустили
                    важное</p>
            </div>
            <div class="line">
                <img src="https://files.carrotquest.app/message-images/68184/68184-1756107798115-e7ycd41p.png" alt=""
                     class="line_img">
                <p class="line_text"><span>Подобрать решение</span> с экспертом, задав всего пару <br class="pc">вопросов о ваших
                    HR-задачах</p>
            </div>
            <a href="#" target="_blank" class="link">Перейти в Telegram</a>
        </form>
        <img src="https://files.carrotquest.app/message-images/68184/68184-1756107779504-00fz8w3w.png" alt=""
             class="pc">
        <img src="https://files.carrotquest.app/message-images/68184/68184-1756108168338-mnpe5fii.png" alt=""
             class="mob">
    </div>
</div>
<script src="./popup/dist/popup.js" inline></script>
</body>
</html>
