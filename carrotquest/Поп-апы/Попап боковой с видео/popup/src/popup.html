<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./popup/dist/popup.css" inline>
</head>

<body>
<div id="popmechanic-form" class="popmechanic-reset video-widget mini" data-state="default">
    <div class="video-widget__container mutted">
        <video data-popmechanic-submit id="video-widget__video" loop="" autoplay="" playsinline="" muted="muted"
               preload="auto" controlslist="nodownload" disablepictureinpicture="" class="video-widget__video">
            <source src="https://files.carrotquest.app/messagesfiles/3ae7f937-5046-4072-b91d-d6476751f1dc/futbol.mp4" type="video/mp4">
        </video>
        <div class="popmechanic-close" data-popmechanic-close>
            <svg width="14" height="14" viewBox="0 0 118 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 0.818077L17.1819 0L9 8.18192L0.818077 0L0 0.818077L8.18192 9L0 17.1819L0.818077 18L9 9.81808L17.1819 18L18 17.1819L9.81808 9L18 0.818077Z"
                      fill="#FFFFFF"/>
            </svg>
        </div>

    </div>
    <a href="#" target="_blank" class="link hidden">Подробнее в TG
        <svg width="17" height="15" viewBox="0 0 17 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.16773 6.28102L15.5658 0.811087C16.2341 0.57321 16.8177 0.971715 16.6012 1.96736L16.6024 1.96614L14.1509 13.3462C13.9692 14.153 13.4826 14.3492 12.8019 13.9691L9.06862 11.258L7.26793 12.9673C7.06882 13.1635 6.90083 13.329 6.51505 13.329L6.78012 9.58554L13.6992 3.4265C14.0003 3.16533 13.632 3.01819 13.235 3.27814L4.6845 8.58253L0.99849 7.44955C0.198321 7.19942 0.180899 6.66113 1.16773 6.28102Z" fill="white"/>
        </svg>
    </a>
</div>
<form action="" class="phone_form hidden">
    <a class="cq-popup__close"></a>
    <img src="https://files.carrotquest.app/message-images/64220/64220-1740736502207-jqadldf2.png" alt="" class="top_img">
    <div class="form_content">
        <p class="form_title">
            Хотите водить с лучшими? Мы обучаем, поддерживаем и ценим наших водителей!
        </p>
        <p class="form_subtitle">
            Оставьте заявку, и мы обсудим ваши возможности в нашей команде.
        </p>
        <input class="cq_popup-input phone" type="tel" name="phone" placeholder="Ваш телефон*" required>
        <button type="submit" class="cq_btn">Оставить заявку</button>
        <p class="eula">
            *Нажимая на кнопку “Оставить заявку”, вы соглашаетесь с <a href="#" target="_blank">Политикой конфиденциальности</a>
        </p>
    </div>
</form>
<div class="thank hidden">
    <a class="cq-popup__close"></a>
    <p class="form_title">
        Заявка принята!
    </p>
    <p class="form_subtitle">
        Мы свяжемся с вами в ближайшее время
    </p>
    <img src="https://files.carrotquest.app/message-images/64220/64220-1740737337865-n1why9vt.png" alt="">
</div>
<script src="./popup/dist/popup.js" inline></script>
</body>
</html>
