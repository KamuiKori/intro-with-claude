<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./popup/dist/popup.css" inline>
</head>
<body>
<div class="cq-popup__bg"></div>

<div class="wrapper__body">
    <div class="dessert-card">
        <button class="card-close" aria-label="Закрыть"></button>

        <div class="dessert-card__img"></div>

        <div class="dessert-card__content">

            <div class="dessert-step" id="step-quiz">
                <p class="dessert-headline">У НАС К ВАМ ПРЕДЛОЖЕНИЕ!</p>
                <p class="dessert-text">Мы попробуем угадать, какой спектакль «Современника» вам понравится, по вашему вкусу в десертах. 😊</p>
                <p class="dessert-question">ЧТО ВЫ БОЛЬШЕ ЛЮБИТЕ?</p>
                <div class="dessert-grid">
                    <button class="dessert-btn" data-dessert="medovik">
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205092356-nwr1gwoj.png" alt="Медовик" class="dessert-btn__img">
                        <span>МЕДОВИК</span>
                    </button>
                    <button class="dessert-btn" data-dessert="tiramisu">
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205117593-w1tmzmnn.png" alt="Тирамису" class="dessert-btn__img">
                        <span>ТИРАМИСУ</span>
                    </button>
                    <button class="dessert-btn" data-dessert="cheesecake">
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205131270-jejdxttj.png" alt="Чизкейк" class="dessert-btn__img">
                        <span>ЧИЗКЕЙК</span>
                    </button>
                    <button class="dessert-btn" data-dessert="fondan">
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205744818-ixg00irq.png" alt="Шоколадный фондан" class="dessert-btn__img">
                        <span>ШОКОЛАДНЫЙ ФОНДАН</span>
                    </button>
                </div>
            </div>

            <div class="dessert-step hidden" id="step-result">
                <p class="result-label">ВАМ МОЖЕТ ПОНРАВИТЬСЯ:</p>
                <p class="result-title" id="result-title"></p>
                <p class="result-desc" id="result-desc"></p>
                <a class="result-btn" id="result-link" href="#" target="_blank">ПОДРОБНЕЕ →</a>
            </div>

        </div>
    </div>
</div>

<script src="./popup/dist/popup.js" inline></script>
</body>
</html>
