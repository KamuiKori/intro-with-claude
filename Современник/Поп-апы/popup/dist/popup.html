<!DOCTYPE html>\
<html lang="ru">\
<head>\
    <meta charset="UTF-8">\
    <meta name="viewport" content="width=device-width, initial-scale=1">\
    <meta http-equiv="X-UA-Compatible" content="ie=edge">\
    <style>@font-face {\
  font-family: "Basis Grotesque Pro";\
  font-weight: 400;\
  src: url("https://sovremennik.ru/packs/media/fonts/BasisGrotesquePro-Regular-fc5973283fa334f121eab2cc2ba8ecc2.woff2") format("woff2");\
}\
\
@font-face {\
  font-family: "Basis Grotesque Pro";\
  font-weight: 500;\
  src: url("https://sovremennik.ru/packs/media/fonts/BasisGrotesquePro-Medium-3a4f1d525cbb8b808873b7cabf23a2c2.woff2") format("woff2");\
}\
\
@font-face {\
  font-family: "Basis Grotesque Pro";\
  font-weight: 700;\
  src: url("https://sovremennik.ru/packs/media/fonts/BasisGrotesquePro-Medium-3a4f1d525cbb8b808873b7cabf23a2c2.woff2") format("woff2");\
}\
\
* {\
  margin: 0;\
  padding: 0;\
  box-sizing: border-box;\
  -webkit-font-smoothing: antialiased;\
  -webkit-tap-highlight-color: transparent;\
  font-family: "Basis Grotesque Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;\
}\
\
html,\
body {\
  height: 100%;\
}\
\
body {\
  overflow: hidden;\
}\
\
a {\
  color: inherit;\
}\
\
.cq-popup__bg {\
  position: fixed;\
  inset: 0;\
  background: rgba(51, 51, 51, 0.5);\
  backdrop-filter: blur(5px);\
  -webkit-backdrop-filter: blur(5px);\
  z-index: 0;\
}\
\
.wrapper__body {\
  position: relative;\
  z-index: 1;\
  display: -ms-flexbox;\
  display: flex;\
  -ms-flex-align: center;\
      align-items: center;\
  -ms-flex-pack: center;\
      justify-content: center;\
  width: 100%;\
  height: 100%;\
  padding: 15px;\
}\
\
.dessert-card {\
  position: relative;\
  display: -ms-flexbox;\
  display: flex;\
  width: 100%;\
  max-width: 900px;\
  background: #f5ece2;\
}\
\
.dessert-card::before {\
  content: "";\
  position: absolute;\
  inset: 8px;\
  border: 1px solid #2d2d2b;\
  pointer-events: none;\
  z-index: 2;\
}\
\
.dessert-card__img {\
  -ms-flex-negative: 0;\
      flex-shrink: 0;\
  width: 46%;\
  min-height: 440px;\
  background-image: url("https://files.carrotquest.app/message-images/70629/70629-1782204995240-1i3xfk8m.png");\
  background-size: cover;\
  background-position: center;\
}\
\
.dessert-card__content {\
  -ms-flex: 1;\
      flex: 1;\
  padding: 52px 44px 44px;\
  display: -ms-flexbox;\
  display: flex;\
  -ms-flex-direction: column;\
      flex-direction: column;\
  -ms-flex-pack: center;\
      justify-content: center;\
}\
\
.card-close {\
  position: absolute;\
  top: 16px;\
  right: 20px;\
  z-index: 10;\
  width: 14px;\
  height: 14px;\
  background: transparent;\
  border: none;\
  cursor: pointer;\
  padding: 0;\
}\
\
.card-close::before,\
.card-close::after {\
  content: "";\
  position: absolute;\
  top: 50%;\
  left: 0;\
  width: 100%;\
  height: 1.5px;\
  background: #2d2d2b;\
  -webkit-transform-origin: center;\
          transform-origin: center;\
}\
\
.card-close::before {\
  -webkit-transform: translateY(-50%) rotate(45deg);\
          transform: translateY(-50%) rotate(45deg);\
}\
\
.card-close::after {\
  -webkit-transform: translateY(-50%) rotate(-45deg);\
          transform: translateY(-50%) rotate(-45deg);\
}\
\
.dessert-step {\
  display: -ms-flexbox;\
  display: flex;\
  -ms-flex-direction: column;\
      flex-direction: column;\
}\
\
.dessert-headline {\
  font-size: 36px;\
  font-weight: 700;\
  line-height: 1.1;\
  color: #2d2d2b;\
  text-transform: uppercase;\
  margin-bottom: 16px;\
}\
\
.dessert-text {\
  font-size: 14px;\
  font-weight: 400;\
  line-height: 1.55;\
  color: #2d2d2b;\
  margin-bottom: 12px;\
}\
\
.dessert-question {\
  font-size: 13px;\
  font-weight: 700;\
  line-height: 1.4;\
  color: #2d2d2b;\
  text-transform: uppercase;\
  margin-bottom: 14px;\
}\
\
.dessert-grid {\
  display: grid;\
  grid-template-columns: 1fr 1fr;\
  gap: 8px;\
}\
\
.dessert-btn {\
  display: -ms-flexbox;\
  display: flex;\
  -ms-flex-align: center;\
      align-items: center;\
  gap: 10px;\
  padding: 8px 14px;\
  background: transparent;\
  border: 1px solid #2d2d2b;\
  cursor: pointer;\
  text-align: left;\
  font-family: "Basis Grotesque Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;\
  font-size: 13px;\
  font-weight: 400;\
  color: #2d2d2b;\
  text-transform: uppercase;\
  line-height: 1.3;\
  min-height: 64px;\
}\
\
.dessert-btn__img {\
  -o-object-fit: contain;\
     object-fit: contain;\
  -ms-flex-negative: 0;\
      flex-shrink: 0;\
}\
\
.result-label {\
  font-size: 14px;\
  font-weight: 500;\
  line-height: 1.3;\
  color: #2d2d2b;\
  text-transform: uppercase;\
  margin-bottom: 10px;\
}\
\
.result-title {\
  font-size: 36px;\
  font-weight: 700;\
  line-height: 1.1;\
  color: #2d2d2b;\
  text-transform: uppercase;\
  margin-bottom: 16px;\
}\
\
.result-desc {\
  font-size: 14px;\
  font-weight: 400;\
  line-height: 1.55;\
  color: #2d2d2b;\
  margin-bottom: 24px;\
}\
\
.result-btn {\
  display: -ms-flexbox;\
  display: flex;\
  -ms-flex-align: center;\
      align-items: center;\
  -ms-flex-pack: center;\
      justify-content: center;\
  height: 50px;\
  background: #2d2d2b;\
  color: #ffffff;\
  font-family: "Basis Grotesque Pro", "Helvetica Neue", Helvetica, Arial, sans-serif;\
  font-size: 14px;\
  font-weight: 400;\
  text-decoration: none;\
  letter-spacing: 0.05em;\
  text-transform: uppercase;\
  cursor: pointer;\
  transition: opacity 0.2s ease;\
}\
\
.result-btn:hover {\
  opacity: 0.85;\
}\
\
.hidden {\
  display: none !important;\
}\
\
@media (max-width: 700px) {\
  .wrapper__body {\
    padding: 20px;\
    -ms-flex-align: center;\
        align-items: center;\
  }\
\
  .dessert-card {\
    -ms-flex-direction: column;\
        flex-direction: column;\
    max-width: 375px;\
  }\
\
  .dessert-card__img {\
    display: none;\
  }\
\
  .dessert-card__content {\
    padding: 44px 28px 32px;\
  }\
\
  .dessert-headline {\
    font-size: 28px;\
    text-align: center;\
    margin-bottom: 14px;\
  }\
\
  .dessert-text {\
    text-align: center;\
    font-size: 13px;\
    margin-bottom: 10px;\
  }\
\
  .dessert-question {\
    text-align: center;\
    font-size: 12px;\
    margin-bottom: 12px;\
  }\
\
  .dessert-grid {\
    grid-template-columns: 1fr;\
    gap: 8px;\
  }\
\
  .dessert-btn {\
    font-size: 13px;\
    min-height: 62px;\
  }\
\
  .result-label {\
    text-align: center;\
  }\
\
  .result-title {\
    font-size: 28px;\
    text-align: center;\
  }\
\
  .result-desc {\
    font-size: 13px;\
    text-align: center;\
  }\
}</style>\
</head>\
<body>\
<div class="cq-popup__bg"></div>\
\
<div class="wrapper__body">\
    <div class="dessert-card">\
        <button class="card-close" aria-label="Закрыть"></button>\
\
        <div class="dessert-card__img"></div>\
\
        <div class="dessert-card__content">\
\
            <div class="dessert-step" id="step-quiz">\
                <p class="dessert-headline">У НАС К ВАМ ПРЕДЛОЖЕНИЕ!</p>\
                <p class="dessert-text">Мы попробуем угадать, какой спектакль «Современника» вам понравится, по вашему вкусу в десертах. 😊</p>\
                <p class="dessert-question">ЧТО ВЫ БОЛЬШЕ ЛЮБИТЕ?</p>\
                <div class="dessert-grid">\
                    <button class="dessert-btn" data-dessert="medovik">\
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205092356-nwr1gwoj.png" alt="Медовик" class="dessert-btn__img">\
                        <span>МЕДОВИК</span>\
                    </button>\
                    <button class="dessert-btn" data-dessert="tiramisu">\
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205117593-w1tmzmnn.png" alt="Тирамису" class="dessert-btn__img">\
                        <span>ТИРАМИСУ</span>\
                    </button>\
                    <button class="dessert-btn" data-dessert="cheesecake">\
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205131270-jejdxttj.png" alt="Чизкейк" class="dessert-btn__img">\
                        <span>ЧИЗКЕЙК</span>\
                    </button>\
                    <button class="dessert-btn" data-dessert="fondan">\
                        <img src="https://files.carrotquest.app/message-images/70629/70629-1782205744818-ixg00irq.png" alt="Шоколадный фондан" class="dessert-btn__img">\
                        <span>ШОКОЛАДНЫЙ ФОНДАН</span>\
                    </button>\
                </div>\
            </div>\
\
            <div class="dessert-step hidden" id="step-result">\
                <p class="result-label">ВАМ МОЖЕТ ПОНРАВИТЬСЯ:</p>\
                <p class="result-title" id="result-title"></p>\
                <p class="result-desc" id="result-desc"></p>\
                <a class="result-btn" id="result-link" href="#" target="_blank">ПОДРОБНЕЕ →</a>\
            </div>\
\
        </div>\
    </div>\
</div>\
\
<script>"use strict";\
\
var cqpopup_name = "Попап партнеры";\
var carrotquest = {\
  track: function track(eventName, params) {\
    parent.window.carrotquest.track(eventName, params);\
  },\
  identify: function identify(props) {\
    parent.window.carrotquest.identify(props);\
  },\
  trackMessageInteraction: function trackMessageInteraction(sendingId, type) {\
    parent.window.carrotquest.trackMessageInteraction(sendingId, type);\
  },\
  animation: function animation() {\
    var data = {\
      command: "carrotquest.animationPopup",\
      "id": "{{ sending_id }}",\
      "cqpopup_name": cqpopup_name\
    };\
    top.postMessage(data, "*");\
  },\
  close: function close() {\
    var data = {\
      command: "carrotquest.closePopup",\
      "id": "{{ sending_id }}"\
    };\
    top.postMessage(data, "*");\
  },\
  replied: function replied() {\
    this.trackMessageInteraction("{{ sending_id }}", "replied");\
    this.track(\'Ответил в попап\');\
    this.track("Коммуникации: Ответил на сообщение - " + cqpopup_name);\
  },\
  clicked: function clicked() {\
    this.trackMessageInteraction("{{ sending_id }}", "clicked");\
    this.track(\'Перешел по ссылке в попапе\');\
    this.track("Коммуникации: Перешел по ссылке в сообщении - " + cqpopup_name);\
  },\
  read: function read() {\
    this.trackMessageInteraction("{{ sending_id }}", "read");\
    this.track(\'Прочитал попап\');\
    this.track("Коммуникации: Прочитано сообщение - " + cqpopup_name);\
  }\
};\
var desserts = {\
  medovik: {\
    name: \'Медовик\',\
    title: \'Женитьба Бальзаминова\',\
    desc: \'Для вас ценны традиции вкуса и не выходящая из моды русская классика «Женитьба Бальзаминова»\',\
    link: \'https://sovremennik.ru/plays/zhenitba-balzaminova\'\
  },\
  tiramisu: {\
    name: \'Тирамису\',\
    title: \'Житие FM\',\
    desc: \'Вы цените нежные текстуры и сбалансированный кофейно-сливочный вкус. У итальянского десерта многослойная структура\',\
    link: \'https://sovremennik.ru/plays/zhitie-fyodora-mihajlovicha\'\
  },\
  cheesecake: {\
    name: \'Чизкейк\',\
    title: \'Сашашишин\',\
    desc: \'Этот десерт ценят не только за нежный вкус, но и за красивую подачу\',\
    link: \'https://sovremennik.ru/plays/sasha-shishin\'\
  },\
  fondan: {\
    name: \'Шоколадный фондан\',\
    title: \'Три товарища\',\
    desc: \'Вам нравится контраст текстур и насыщенный вкус. Вам подходят спектакли, которые оставляют яркие впечатления\',\
    link: \'https://sovremennik.ru/plays/tri-tovarischa\'\
  }\
};\
document.addEventListener("readystatechange", function () {\
  if (document.readyState === "complete") {\
    carrotquest.read();\
    carrotquest.animation();\
  }\
});\
document.addEventListener(\'click\', function (e) {\
  var btn = e.target.closest(\'.dessert-btn\');\
  if (!btn) return;\
  var key = btn.getAttribute(\'data-dessert\');\
  var data = desserts[key];\
  if (!data) return;\
  carrotquest.track(\'Выбрал десерт\', {\
    десерт: data.name\
  });\
  carrotquest.replied();\
  document.getElementById(\'result-title\').textContent = data.title;\
  document.getElementById(\'result-desc\').textContent = data.desc;\
  document.getElementById(\'result-link\').href = data.link;\
  showStep(\'step-result\');\
});\
document.addEventListener(\'click\', function (e) {\
  if (!e.target.closest(\'#result-link\')) return;\
  carrotquest.track(\'Нажал подробнее попап партнеры\');\
  carrotquest.clicked();\
});\
document.addEventListener(\'click\', function (e) {\
  if (e.target.closest(\'.card-close\') || e.target.classList.contains(\'cq-popup__bg\')) {\
    carrotquest.track(\'Закрыл попап партнеры\');\
    carrotquest.close();\
  }\
});\
function showStep(stepId) {\
  document.querySelectorAll(\'.dessert-step\').forEach(function (el) {\
    el.classList.add(\'hidden\');\
  });\
  document.getElementById(stepId).classList.remove(\'hidden\');\
}</script>\
</body>\
</html>\
